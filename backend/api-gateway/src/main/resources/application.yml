server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/**

            - id: user-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/users/**

            - id: chat-service
              uri: ws://localhost:8083
              predicates:
                - Path=/ws/**

            - id: message-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/messages/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      access: unrestricted
      show-details: always
    gateway:
      access: unrestricted

logging:
  level:
    org.springframework.cloud.gateway: DEBUG