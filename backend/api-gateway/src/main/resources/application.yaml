server:
  port: ${GATEWAY_SERVER_PORT:8080}
  server-header: " "

spring:
  application:
    name: api-gateway
  main:
    allow-bean-definition-overriding: true
    web-application-type: reactive
  data:
    redis:
      host: ${REDIS_HOST:orangchat-redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      connect-timeout: 2000ms
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX:8}
          max-idle: ${REDIS_POOL_IDLE:8}
          min-idle: 2
  cloud:
    gateway:
      server:
        webflux:
          cors:
            cors-configurations:
              '[/**]':
                allowed-origins: ${CORS_ALLOWED_ORIGINS}
                allowed-methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
                allowed-headers: "*"
                allow-credentials: true
                max-age: 3600
          routes:
            # -----------------------------------------
            # Auth Service Routes
            # -----------------------------------------
            - id: auth-service-docs
              uri: ${AUTH_SERVICE_URL}
              predicates:
                - Path=/v3/api-docs/api/auth

            - id: auth-service
              uri: ${AUTH_SERVICE_URL}
              predicates:
                - Path=/api/auth/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 5
                    redis-rate-limiter.burstCapacity: 10
                    key-resolver: "#{@ipKeyResolver}"

            # -----------------------------------------
            # User Service Routes
            # -----------------------------------------
            - id: user-service-docs
              uri: ${USER_SERVICE_URL}
              predicates:
                - Path=/v3/api-docs/api/users, /v3/api-docs/api/contacts, /v3/api-docs/api/presence

            - id: user-service
              uri: ${USER_SERVICE_URL}
              predicates:
                - Path=/api/users/**, /api/contacts/**, /api/presence/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 20
                    redis-rate-limiter.burstCapacity: 40
                    key-resolver: "#{@userKeyResolver}"

            # -----------------------------------------
            # Notification Service Routes
            # -----------------------------------------
            - id: notification-service-docs
              uri: ${NOTIFICATION_SERVICE_URL}
              predicates:
                - Path=/v3/api-docs/api/notifications

            - id: notification-service
              uri: ${NOTIFICATION_SERVICE_URL}
              predicates:
                - Path=/api/push/**, /api/conversations/*/notifications/**, /api/notifications/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"

            # -----------------------------------------
            # Message Service Routes
            # -----------------------------------------
            - id: message-service-docs
              uri: ${MESSAGE_SERVICE_URL}
              predicates:
                - Path=/v3/api-docs/api/messages

            - id: message-service
              uri: ${MESSAGE_SERVICE_URL}
              predicates:
                - Path=/api/messages/**, /api/conversations/**, /api/attachments/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 50
                    redis-rate-limiter.burstCapacity: 100
                    key-resolver: "#{@userKeyResolver}"

            # -----------------------------------------
            # Chat Service (WebSocket) - No Rate Limiting
            # -----------------------------------------
            - id: chat-service
              uri: ${CHAT_SERVICE_URL}
              predicates:
                - Path=/ws/**
          httpclient:
            connect-timeout: 2000
            response-timeout: 5s

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      access: unrestricted
      show-details: never

logging:
  level:
    org.springframework.cloud.gateway: ${LOG_LEVEL_GATEWAY:INFO}

springdoc:
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /v3/api-docs/api/auth
      - name: User Service
        url: /v3/api-docs/api/users
      - name: Contacts Service
        url: /v3/api-docs/api/contacts
      - name: Presence Service
        url: /v3/api-docs/api/presence
      - name: Message Service
        url: /v3/api-docs/api/messages
      - name: Notification Service
        url: /v3/api-docs/api/notifications
  api-docs:
    path: /v3/api-docs

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION_MS:900000}