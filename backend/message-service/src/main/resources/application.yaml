server:
  port: 8084

spring:
  application:
    name: message-service
  datasource:
    url: jdbc:postgresql://localhost:5434/message_db
    username: ${DB_USERNAME:messageuser}
    password: ${DB_PASSWORD:messagepass}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:orangchat}
    password: ${RABBITMQ_PASSWORD:orangchat123}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  health:
    defaults:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs/api/messages
  swagger-ui:
    enabled: false