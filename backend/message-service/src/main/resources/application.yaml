server:
  port: ${MESSAGE_SERVER_PORT:8084}
  server-header: " "

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: message-service
  datasource:
    url: ${MESSAGE_SPRING_DATASOURCE_URL}
    username: ${MESSAGE_DATABASE_USERNAME}
    password: ${MESSAGE_DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${HIBERNATE_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBIT_USERNAME}
    password: ${SPRING_RABBIT_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 250MB

jwt:
  secret: ${JWT_SECRET}

minio:
  endpoint: ${MINIO_ENDPOINT}
  external-endpoint: ${MINIO_EXTERNAL_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ${MINIO_BUCKET_NAME:chat-attachments}
  download-mode: ${MINIO_DOWNLOAD_MODE:backend}

thumbnail:
  width: 200
  height: 200
  quality: 0.8

management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator
  endpoint:
    health:
      show-details: ${HEALTH_SHOW_DETAILS:never}
      probes:
        enabled: true
  health:
    defaults:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs/api/messages
  swagger-ui:
    enabled: false