server:
  port: 8084

spring:
  application:
    name: message-service
  datasource:
    url: jdbc:postgresql://localhost:5434/message_db
    username: messageuser
    password: messagepass
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: localhost
    port: 5672
    username: orangchat
    password: orangchat123

jwt:
  secret: myVeryLongSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm123456

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      show-details: always
      access: unrestricted

springdoc:
  api-docs:
    path: /v3/api-docs/api/messages
  swagger-ui:
    enabled: false