server:
  port: ${MESSAGE_SERVER_PORT:8084}
  server-header: " "

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: message-service
  datasource:
    url: ${MESSAGE_SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/message_db}
    username: ${MESSAGE_DATABASE_USERNAME:messageuser}
    password: ${MESSAGE_DATABASE_PASSWORD:messagepass}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${HIBERNATE_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBIT_USERNAME:orangchat}
    password: ${SPRING_RABBIT_PASSWORD:orangchat123}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 250MB

jwt:
  secret: ${JWT_SECRET:myVeryLongSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm123456}

minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  external-endpoint: ${MINIO_EXTERNAL_ENDPOINT:${MINIO_ENDPOINT:http://minio:9000}}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin123}
  bucket-name: ${MINIO_BUCKET_NAME:chat-attachments}
  download-mode: ${MINIO_DOWNLOAD_MODE:backend}

thumbnail:
  width: 200
  height: 200
  quality: 0.8

management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator
  endpoint:
    health:
      show-details: ${HEALTH_SHOW_DETAILS:never}
      probes:
        enabled: true
  health:
    defaults:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs/api/messages
  swagger-ui:
    enabled: false