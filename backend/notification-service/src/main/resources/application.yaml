server:
  port: 8085

spring:
  application:
    name: notification-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/notification_db}
    username: ${SPRING_DATASOURCE_USERNAME:notificationuser}
    password: ${SPRING_DATASOURCE_PASSWORD:notificationpass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: ${SPRING_RABBITMQ_USERNAME:orangchat}
    password: ${SPRING_RABBITMQ_PASSWORD:orangchat123}

# JWT Configuration (MUST match other services!)
jwt:
  secret: ${JWT_SECRET:myVeryLongSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm123456}

# Web Push VAPID Configuration
web-push:
  vapid:
    public-key: ${VAPID_PUBLIC_KEY:BJpbtLz1TmeDHqF-SHenqYTjmGFD_rOAomOUXE-aHQ0g8_sENBPI8PiECPHo3Hn566y8BcCS52szGZtQWV0A_vU}
    private-key: ${VAPID_PRIVATE_KEY:Hf17E44Uk_VegHbti_boVg68zgFQV6pXZ8Pg3Ct5ylk}
    subject: ${VAPID_SUBJECT:mailto:admin@chatapp.com}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.chatapp.notificationservice: DEBUG
    org.springframework.security: WARN
    org.springframework.amqp: INFO