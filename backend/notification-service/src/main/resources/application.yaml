server:
  port: ${NOTIFICATION_SERVER_PORT:8085}
  server-header: " "

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: notification-service
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      client-type: lettuce
    repositories:
      enabled: false

  datasource:
    url: ${NOTIFICATION_SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/notification_db}
    username: ${NOTIFICATION_DATABASE_USERNAME}
    password: ${NOTIFICATION_DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
      secret: ${JWT_SECRET}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME}
    password: ${SPRING_RABBITMQ_PASSWORD}

jwt:
  secret: ${JWT_SECRET}

web-push:
  vapid:
    public-key: ${VAPID_PUBLIC_KEY}
    private-key: ${VAPID_PRIVATE_KEY}
    subject: ${VAPID_SUBJECT}

springdoc:
  api-docs:
    path: /v3/api-docs/api/notifications
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: ${HEALTH_SHOW_DETAILS:never}
      probes:
        enabled: true
  health:
    defaults:
      enabled: true

notification:
  retention:
    days: 30

logging:
  level:
    com.chatapp.notificationservice: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
    org.springframework.amqp: ${LOG_LEVEL_AMQP:INFO}