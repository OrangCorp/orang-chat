server:
  port: ${NOTIFICATION_SERVER_PORT:8085}
  server-header: " "

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: notification-service

  datasource:
    url: ${NOTIFICATION_SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/notification_db}
    username: ${NOTIFICATION_DATABASE_USERNAME:notificationuser}
    password: ${NOTIFICATION_DATABASE_PASSWORD:notificationpass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${HIBERNATE_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:orangchat}
    password: ${SPRING_RABBITMQ_PASSWORD:orangchat123}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:myVeryLongSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm123456}

# Web Push VAPID Configuration
web-push:
  vapid:
    public-key: ${VAPID_PUBLIC_KEY:BJpbtLz1TmeDHqF-SHenqYTjmGFD_rOAomOUXE-aHQ0g8_sENBPI8PiECPHo3Hn566y8BcCS52szGZtQWV0A_vU}
    private-key: ${VAPID_PRIVATE_KEY:Hf17E44Uk_VegHbti_boVg68zgFQV6pXZ8Pg3Ct5ylk}
    subject: ${VAPID_SUBJECT:mailto:admin@chatapp.com}

springdoc:
  api-docs:
    path: /v3/api-docs/api/notifications
  swagger-ui:
    enabled: false

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: ${HEALTH_SHOW_DETAILS:never}
      probes:
        enabled: true
  health:
    defaults:
      enabled: true

# Logging
logging:
  level:
    com.chatapp.notificationservice: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
    org.springframework.amqp: ${LOG_LEVEL_AMQP:INFO}