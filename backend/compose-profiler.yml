services:
  api-gateway:
    build:
      context: .
      dockerfile: service.Dockerfile
      args:
        SERVICE_NAME: api-gateway
        SERVICE_PORT: 8080
    container_name: orangchat-api-gateway
    ports:
      - "8080:8080"
      - "9010:9010" # JMX Port
    networks:
      - frontend-nw
      - backend-nw
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8081
      - USER_SERVICE_URL=http://user-service:8082
      - CHAT_SERVICE_URL=ws://chat-service:8083
      - MESSAGE_SERVICE_URL=http://message-service:8084
      - NOTIFICATION_SERVICE_URL=http://notification-service:8085
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS must be set}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - JAVA_TOOL_OPTIONS=-Dcom.sun.management.jmxremote -Dcom.sun.management.jmxremote.port=9010 -Dcom.sun.management.jmxremote.rmi.port=9010 -Dcom.sun.management.jmxremote.local.only=false -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Djava.rmi.server.hostname=localhost
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: service.Dockerfile
      args:
        SERVICE_NAME: auth-service
        SERVICE_PORT: 8081
    container_name: orangchat-auth-service
    ports:
      - "9011:9011" # JMX Port
    networks:
      - backend-nw
      - db-nw
    environment:
      - AUTH_SERVER_PORT=8081
      - AUTH_SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-auth:5432/auth_db
      - AUTH_DATABASE_USERNAME=${AUTH_DB_USER:?AUTH_DB_USER must be set}
      - AUTH_DATABASE_PASSWORD=${AUTH_DB_PASS:?AUTH_DB_PASS must be set}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - MAIL_HOST=${MAIL_HOST:?MAIL_HOST must be set}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USER=${RABBIT_USER:?RABBIT_USER must be set}
      - SPRING_RABBITMQ_PASSWORD=${RABBIT_PASS:?RABBIT_PASS must be set}
      - MAIL_USERNAME=${MAIL_USER:?MAIL_USER must be set}
      - MAIL_PASSWORD=${MAIL_PASS:?MAIL_PASSWORD must be set}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - SPRING_PROFILES_ACTIVE=dev
      - JAVA_TOOL_OPTIONS=-Dcom.sun.management.jmxremote -Dcom.sun.management.jmxremote.port=9011 -Dcom.sun.management.jmxremote.rmi.port=9011 -Dcom.sun.management.jmxremote.local.only=false -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Djava.rmi.server.hostname=localhost
    depends_on:
      postgres-auth:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    restart: unless-stopped

  user-service:
    build:
      context: .
      dockerfile: service.Dockerfile
      args:
        SERVICE_NAME: user-service
        SERVICE_PORT: 8082
    container_name: orangchat-user-service
    ports:
      - "9012:9012" # JMX Port
    networks:
      - backend-nw
      - db-nw
    environment:
      - USER_SERVER_PORT=8082
      - USER_SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-user:5432/user_db
      - USER_DATABASE_USERNAME=${USER_DB_USER:?USER_DB_USER must be set}
      - USER_DATABASE_PASSWORD=${USER_DB_PASS:?USER_DB_PASS must be set}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USERNAME=${RABBIT_USER:?RABBIT_USER must be set}
      - SPRING_RABBITMQ_PASSWORD=${RABBIT_PASS:?RABBIT_PASS must be set}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - JAVA_TOOL_OPTIONS=-Dcom.sun.management.jmxremote -Dcom.sun.management.jmxremote.port=9012 -Dcom.sun.management.jmxremote.rmi.port=9012 -Dcom.sun.management.jmxremote.local.only=false -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Djava.rmi.server.hostname=localhost
    depends_on:
      postgres-user:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    restart: unless-stopped

  chat-service:
    build:
      context: .
      dockerfile: service.Dockerfile
      args:
        SERVICE_NAME: chat-service
        SERVICE_PORT: 8083
    container_name: orangchat-chat-service
    ports:
      - "9013:9013" # JMX Port
    networks:
      - backend-nw
    environment:
      - CHAT_SERVER_PORT=8083
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USER=${RABBIT_USER:?RABBIT_USER must be set}
      - SPRING_RABBITMQ_PASSWORD=${RABBIT_PASS:?RABBIT_PASS must be set}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - JWT_SECRET=${JWT_SECRET}
      - JAVA_TOOL_OPTIONS=-Dcom.sun.management.jmxremote -Dcom.sun.management.jmxremote.port=9013 -Dcom.sun.management.jmxremote.rmi.port=9013 -Dcom.sun.management.jmxremote.local.only=false -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Djava.rmi.server.hostname=localhost
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    restart: unless-stopped

  message-service:
    build:
      context: .
      dockerfile: service.Dockerfile
      args:
        SERVICE_NAME: message-service
        SERVICE_PORT: 8084
    container_name: orangchat-message-service
    ports:
      - "9014:9014" # JMX Port
    networks:
      - backend-nw
      - db-nw
    environment:
      - MESSAGE_SERVER_PORT=8084
      - MESSAGE_SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-message:5432/message_db
      - MESSAGE_DATABASE_USERNAME=${MESSAGE_DB_USER:?MESSAGE_DB_USER must be set}
      - MESSAGE_DATABASE_PASSWORD=${MESSAGE_DB_PASS:?MESSAGE_DB_PASS must be set}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBIT_USERNAME=${RABBIT_USER:?RABBIT_USER must be set}
      - SPRING_RABBIT_PASSWORD=${RABBIT_PASS:?RABBIT_PASS must be set}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:?MINIO_ENDPOINT must be set}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASS:?MINIO_ROOT_PASS must be set}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - MINIO_DOWNLOAD_MODE=${MINIO_DOWNLOAD_MODE:?MINIO_DOWNLOAD_MODE must be set}
      - MINIO_EXTERNAL_ENDPOINT=${MINIO_EXTERNAL_ENDPOINT:?MINIO_EXTERNAL_ENDPOINT must be set}
      - JAVA_TOOL_OPTIONS=-Dcom.sun.management.jmxremote -Dcom.sun.management.jmxremote.port=9014 -Dcom.sun.management.jmxremote.rmi.port=9014 -Dcom.sun.management.jmxremote.local.only=false -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Djava.rmi.server.hostname=localhost
    depends_on:
      postgres-message:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: service.Dockerfile
      args:
        SERVICE_NAME: notification-service
        SERVICE_PORT: 8085
    container_name: orangchat-notification-service
    ports:
      - "9015:9015" # JMX Port
    networks:
      - backend-nw
      - db-nw
    environment:
      - NOTIFICATION_SERVER_PORT=8085
      - NOTIFICATION_SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-notification:5432/notification_db
      - NOTIFICATION_DATABASE_USERNAME=${NOTIF_DB_USER:?NOTIF_DB_USER must be set}
      - NOTIFICATION_DATABASE_PASSWORD=${NOTIF_DB_PASS:?NOTIF_DB_PASS must be set}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - SPRING_RABBITMQ_USERNAME=${RABBIT_USER:?RABBIT_USER must be set}
      - SPRING_RABBITMQ_PASSWORD=${RABBIT_PASS:?RABBIT_PASS must be set}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - VAPID_PUBLIC_KEY=${VAPID_PUB:?VAPID_PUB must be set}
      - VAPID_PRIVATE_KEY=${VAPID_PRIV:?VAPID_PRIV must be set}
      - VAPID_SUBJECT=${VAPID_SUBJECT:?VAPID_SUBJECT must be set}
      - JAVA_TOOL_OPTIONS=-Dcom.sun.management.jmxremote -Dcom.sun.management.jmxremote.port=9015 -Dcom.sun.management.jmxremote.rmi.port=9015 -Dcom.sun.management.jmxremote.local.only=false -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Djava.rmi.server.hostname=localhost
    depends_on:
      postgres-notification:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8085/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    restart: unless-stopped

  # Database and infrastructure services remain unchanged
  postgres-auth:
    image: postgres:18-alpine3.22
    container_name: orangchat-postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: ${AUTH_DB_USER:?AUTH_DB_USER must be set}
      POSTGRES_PASSWORD: ${AUTH_DB_PASS:?AUTH_DB_PASS must be set}
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    networks:
      - db-nw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-user:
    image: postgres:18-alpine3.22
    container_name: orangchat-postgres-user
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: ${USER_DB_USER:?USER_DB_USER must be set}
      POSTGRES_PASSWORD: ${USER_DB_PASS:?USER_DB_PASS must be set}
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
    networks:
      - db-nw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-message:
    image: postgres:18-alpine3.22
    container_name: orangchat-postgres-message
    environment:
      POSTGRES_DB: message_db
      POSTGRES_USER: ${MESSAGE_DB_USER:?MESSAGE_DB_USER must be set}
      POSTGRES_PASSWORD: ${MESSAGE_DB_PASS:?MESSAGE_DB_PASS must be set}
    volumes:
      - postgres-message-data:/var/lib/postgresql/data
    networks:
      - db-nw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-notification:
    image: postgres:18-alpine3.22
    container_name: orangchat-postgres-notification
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: ${NOTIF_DB_USER:?NOTIF_DB_USER must be set}
      POSTGRES_PASSWORD: ${NOTIF_DB_PASS:?NOTIF_DB_PASS must be set}
    volumes:
      - postgres-notification-data:/var/lib/postgresql/data
    networks:
      - db-nw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.1-alpine
    container_name: orangchat-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis-data:/data
    networks:
      - backend-nw
      - db-nw
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.2.4-management-alpine
    container_name: orangchat-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_USER:?RABBIT_USER must be set}
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASS:?RABBIT_PASS must be set}
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - backend-nw
      - db-nw
    command: sh -c "rabbitmq-plugins enable --offline rabbitmq_stomp rabbitmq_management && rabbitmq-server"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: orangchat-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASS:?MINIO_ROOT_PASS must be set}
    volumes:
      - minio-data:/data
    networks:
      - db-nw
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres-auth-data:
  postgres-user-data:
  postgres-message-data:
  postgres-notification-data:
  redis-data:
  rabbitmq-data:
  minio-data:

networks:
  frontend-nw:
    driver: bridge
  backend-nw:
    driver: bridge
  db-nw:
    driver: bridge