server:
  port: 8083

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: chat-service
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: 5672
    username: ${RABBITMQ_USER:orangchat}
    password: ${RABBITMQ_PASSWORD:orangchat123}
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: myVeryLongSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm123456

logging:
  level:
    com.orang.chatservice: DEBUG
    org.springframework.messaging: INFO
    org.springframework.web.socket: INFO

management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  health:
    defaults:
      enabled: true

