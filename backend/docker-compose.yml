services:
  postgres-auth:
    image: postgres:18-alpine3.22
    container_name: orangchat-postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: authuser
      POSTGRES_PASSWORD: authpass
    ports:
      - "5432:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    networks:
      - orangchat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authuser -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-user:
    image: postgres:18-alpine3.22
    container_name: orangchat-postgres-user
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: useruser
      POSTGRES_PASSWORD: userpass
    ports:
      - "5433:5432"
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
    networks:
      - orangchat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U useruser -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-message:
    image: postgres:18-alpine3.22
    container_name: orangchat-postgres-message
    environment:
      POSTGRES_DB: message_db
      POSTGRES_USER: messageuser
      POSTGRES_PASSWORD: messagepass
    ports:
      - "5434:5432"
    volumes:
      - postgres-message-data:/var/lib/postgresql/data
    networks:
      - orangchat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U messageuser -d message_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.1-alpine
    container_name: orangchat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - orangchat-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.2.4-management-alpine
    container_name: orangchat-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: orangchat
      RABBITMQ_DEFAULT_PASS: orangchat123
    ports:
      - "5672:5672"
      - "15672:15672"
      - "61613:61613"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - orangchat-network
    command: sh -c "rabbitmq-plugins enable --offline rabbitmq_stomp rabbitmq_management && rabbitmq-server"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  minio:
    # Tag latest, ponieważ projekt jest zarchiwizowany na docker hubie
    image: minio/minio:latest
    container_name: orangchat-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - minio-data:/data
    networks:
      - orangchat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres-auth-data:
  postgres-user-data:
  postgres-message-data:
  redis-data:
  rabbitmq-data:
  minio-data:

networks:
  orangchat-network:
    driver: bridge