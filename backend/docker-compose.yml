services:
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: orangchat-api-gateway
    ports:
      - "8080:8080"
    networks:
      - orangchat-network
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8081
      - USER_SERVICE_URL=http://user-service:8082
      - CHAT_SERVICE_URL=ws://chat-service:8083
      - MESSAGE_SERVICE_URL=http://message-service:8084
    depends_on:
      - auth-service
      - user-service
      - message-service
      - chat-service

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: orangchat-auth-service
    ports:
      - "8081:8081"
    networks:
      - orangchat-network
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-auth:5432/auth_db
    depends_on:
      postgres-auth:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: orangchat-user-service
    ports:
      - "8082:8082"
    networks:
      - orangchat-network
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-user:5432/user_db
      - SPRING_DATA_REDIS_HOST=orangchat-redis
    depends_on:
      postgres-user:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  chat-service:
    build:
      context: .
      dockerfile: chat-service/Dockerfile
    container_name: orangchat-chat-service
    ports:
      - "8083:8083"
    networks:
      - orangchat-network
    environment:
      - SPRING_RABBITMQ_HOST=orangchat-rabbitmq
      - SPRING_DATA_REDIS_HOST=orangchat-redis
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  message-service:
    build:
      context: .
      dockerfile: message-service/Dockerfile
    container_name: orangchat-message-service
    ports:
      - "8084:8084"
    networks:
      - orangchat-network
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-message:5432/message_db
      - SPRING_RABBITMQ_HOST=orangchat-rabbitmq
    depends_on:
      postgres-message:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  postgres-auth:
    image: postgres:18-alpine3.22
    container_name: orangchat-postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: authuser
      POSTGRES_PASSWORD: authpass
    ports:
      - "5432:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    networks:
      - orangchat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authuser -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-user:
    image: postgres:18-alpine3.22
    container_name: orangchat-postgres-user
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: useruser
      POSTGRES_PASSWORD: userpass
    ports:
      - "5433:5432"
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
    networks:
      - orangchat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U useruser -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-message:
    image: postgres:18-alpine3.22
    container_name: orangchat-postgres-message
    environment:
      POSTGRES_DB: message_db
      POSTGRES_USER: messageuser
      POSTGRES_PASSWORD: messagepass
    ports:
      - "5434:5432"
    volumes:
      - postgres-message-data:/var/lib/postgresql/data
    networks:
      - orangchat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U messageuser -d message_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.1-alpine
    container_name: orangchat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - orangchat-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.2.4-management-alpine
    container_name: orangchat-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: orangchat
      RABBITMQ_DEFAULT_PASS: orangchat123
    ports:
      - "5672:5672"
      - "15672:15672"
      - "61613:61613"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - orangchat-network
    command: sh -c "rabbitmq-plugins enable --offline rabbitmq_stomp rabbitmq_management && rabbitmq-server"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  minio:
    # Tag latest, ponieważ projekt jest zarchiwizowany na docker hubie
    image: minio/minio:latest
    container_name: orangchat-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - minio-data:/data
    networks:
      - orangchat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres-auth-data:
  postgres-user-data:
  postgres-message-data:
  redis-data:
  rabbitmq-data:
  minio-data:

networks:
  orangchat-network:
    driver: bridge