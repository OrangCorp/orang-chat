server:
  port: ${AUTH_SERVER_PORT:8081}
  server-header: " "

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: auth-service
  datasource:
    url: ${AUTH_SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${AUTH_DATABASE_USERNAME:authuser}
    password: ${AUTH_DATABASE_PASSWORD:authpass}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${FORMAT_SQL:false}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USER:orangchat}
    password: ${SPRING_RABBITMQ_PASSWORD:orangchat123}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  mail:
    host: ${MAIL_HOST:sandbox.smtp.mailtrap.io}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

app:
  mail:
    from: ${MAIL_FROM:noreply@orangchat.com}
    from-name: "Orang Chat"
  verification:
    code-expiry-minutes: ${CODE_EXPIRY_MINS:15}
    resend-cooldown-seconds: ${RESEND_COOLDOWN_SEC:60}
    max-attempts: ${MAX_ATTEMPTS:5}
    unverified-account-ttl-days: ${UNVERIFIED_TTL_DAYS:7}
  password-reset:
    token-expiry-hours: ${PWD_RESET_EXPIRY_HRS:1}
    reset-url: ${FRONTEND_URL:http://localhost:3000}/reset-password

jwt:
  secret: ${JWT_SECRET:myVeryLongSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm123456}
  expiration: ${JWT_EXPIRATION_MS:900000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION_MS:604800000}

management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator
  endpoint:
    health:
      show-details: ${HEALTH_SHOW_DETAILS:never}
      probes:
        enabled: true
  health:
    defaults:
      enabled: true
    # Disable mail health check since it can fail if MailTrap limit is reached
    # Email failures should not prevent app startup
    mail:
      enabled: false

springdoc:
  api-docs:
    path: /v3/api-docs/api/auth
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}