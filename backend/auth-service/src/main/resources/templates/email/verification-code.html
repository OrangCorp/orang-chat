<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f5;
            margin: 0;
            padding: 20px;
            color: #18181b;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
        }
        .code {
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 8px;
            color: #2563eb;
            text-align: center;
            padding: 20px;
            background: #eff6ff;
            border-radius: 8px;
            margin: 24px 0;
            font-family: 'Courier New', monospace;
        }
        .expiry {
            color: #71717a;
            font-size: 14px;
            text-align: center;
        }
        .footer {
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid #e4e4e7;
            color: #a1a1aa;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Verify your email</h2>
    <p>Hi <span th:text="${displayName}">User</span>,</p>
    <p>Enter this code in the app to verify your email address:</p>

    <div class="code" th:text="${code}">482917</div>

    <p class="expiry">This code expires in 15 minutes.</p>
    <p>If you didn't create an Orang Chat account, you can safely ignore this email.</p>

    <div class="footer">
        <p>Orang Chat — This is an automated message. Please do not reply.</p>
    </div>
</div>
</body>
</html>
