server:
  port: ${USER_SERVER_PORT:8082}

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: user-service

  datasource:
    url: ${USER_SPRING_DATASOURCE_URL}
    username: ${USER_DATABASE_USERNAME}
    password: ${USER_DATABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${HIBERNATE_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: ${HIBERNATE_FORMAT_SQL:true}

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME}
    password: ${SPRING_RABBITMQ_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator
  endpoint:
    health:
      show-details: ${HEALTH_SHOW_DETAILS:never}
      probes:
        enabled: true
  health:
    defaults:
      enabled: true

logging:
  level:
    com.orang.userservice: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
    org.springframework.amqp: ${LOG_LEVEL_AMQP:INFO}

springdoc:
  api-docs:
    path: /v3/api-docs/api/users
  swagger-ui:
    enabled: false